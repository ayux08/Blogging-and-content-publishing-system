{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us — Blogging and Content Publishing System</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-card animate-fadeInUp" style="max-width:500px;">
            <a href="/" class="navbar-brand" style="justify-content:center;margin-bottom:24px;">
                <div class="brand-icon">B</div>
                <div class="brand-text">
                    <span class="brand-text-main">Blogging &amp; Content</span>
                    <span class="brand-text-sub highlight">Publishing System</span>
                </div>
            </a>
            <h1 style="font-size:1.5rem;">Contact Us</h1>
            <p class="subtitle">We'd love to hear from you</p>

            {% if success %}
            <div class="alert alert-success"><i class="fas fa-check-circle"></i> {{ success }}</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="mobile">Mobile</label>
                    <input type="text" id="mobile" name="mobile" class="form-control">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" class="form-control" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">
                    <i class="fas fa-paper-plane"></i> Send Message
                </button>
            </form>
            <div class="auth-footer">
                <a href="/">← Back to Home</a>
            </div>
        </div>
    </div>
</body>

</html>
