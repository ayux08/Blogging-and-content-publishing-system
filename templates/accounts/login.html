{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Sign in to the Blogging and Content Publishing System - Access your dashboard, manage content, and engage with the community.">
    <title>Sign In — Blogging and Content Publishing System</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-card animate-fadeInUp">
            <a href="/" class="navbar-brand" style="justify-content:center;margin-bottom:32px;">
                <div class="brand-icon">B</div>
                <div class="brand-text">
                    <span class="brand-text-main">Blogging &amp; Content</span>
                    <span class="brand-text-sub highlight">Publishing System</span>
                </div>
            </a>
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to continue to your dashboard</p>

            {% if error %}
            <div class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/accounts/login/">
                {% csrf_token %}
                <div class="form-group">
                    <label for="login_id"><i class="fas fa-user-circle"></i> Username or Email</label>
                    <input type="text" id="login_id" name="login_id" class="form-control"
                        placeholder="Username or Email" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                        placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            <div class="auth-footer">
                Don't have an account? <a href="/accounts/register/">Create one here</a>
            </div>
        </div>
    </div>
</body>

</html>
